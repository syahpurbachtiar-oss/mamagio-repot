<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mama Gio Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #1a2a47; --primary: #ff9800; --bg: #f0f2f5; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; display: flex; background: var(--bg); min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 220px; background: var(--sidebar); color: white; flex-shrink: 0; padding: 20px 0; }
        .sidebar h2 { color: var(--primary); text-align: center; font-size: 1.1rem; margin-bottom: 30px; }
        .nav-item { padding: 15px 25px; cursor: pointer; color: #adb5bd; display: flex; align-items: center; transition: 0.3s; }
        .nav-item i { margin-right: 12px; }
        .nav-item.active { background: #2c3e50; color: var(--primary); border-left: 4px solid var(--primary); }
        .nav-item:hover { color: white; }

        /* Main Content */
        .main { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-refresh { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; }

        /* Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 0.9rem; color: #7f8c8d; }
        .stat-card p { margin: 10px 0 0; font-size: 1.4rem; font-weight: bold; }

        /* Input Belanja */
        .input-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .input-row { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-save { background: #e74c3c; color: white; border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Charts */
        .charts-grid { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 15px; margin-bottom: 20px; }
        .chart-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* Chat Analis AI */
        .ai-chat { background: #1a2a47; color: white; padding: 20px; border-radius: 15px; display: flex; align-items: center; gap: 15px; }
        .ai-chat i { font-size: 2.5rem; color: var(--primary); }
        .ai-content b { color: var(--primary); display: block; margin-bottom: 5px; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 10px 0; display: flex; justify-content: space-around; }
            .sidebar h2 { display: none; }
            .stats-grid, .charts-grid { grid-template-columns: 1fr; }
            .input-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>MAMA GIO ADMIN</h2>
        <div class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</div>
        <div class="nav-item"><i class="fas fa-wallet"></i> Pemasukan</div>
        <div class="nav-item"><i class="fas fa-shopping-basket"></i> Pengeluaran</div>
    </div>

    <div class="main">
        <div class="header">
            <h1 style="font-size: 1.4rem; margin: 0;">Dashboard Overview</h1>
            <button class="btn-refresh" onclick="fetchData()">Refresh</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card" style="border-bottom: 4px solid #1abc9c">
                <h3>Total Omzet</h3><p id="txtOmzet" style="color:#1abc9c">Rp 0</p>
            </div>
            <div class="stat-card" style="border-bottom: 4px solid #e74c3c">
                <h3>Total Biaya</h3><p id="txtBiaya" style="color:#e74c3c">Rp 0</p>
            </div>
            <div class="stat-card" style="border-bottom: 4px solid #3498db">
                <h3>Profit Bersih</h3><p id="txtProfit" style="color:#3498db">Rp 0</p>
            </div>
        </div>

        <div class="input-box">
            <b style="font-size: 1rem;"><i class="fas fa-plus-circle" style="color:var(--primary)"></i> Catat Belanja Baru</b>
            <div class="input-row">
                <input type="text" id="nama" placeholder="Nama Barang (Contoh: Minyak Goreng)">
                <input type="number" id="harga" placeholder="Harga Rp">
                <button class="btn-save" id="btnSimpan" onclick="simpanBelanja()">SIMPAN DATA</button>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card"><canvas id="lineChart"></canvas></div>
            <div class="chart-card"><canvas id="pieChart"></canvas></div>
        </div>

        <div class="ai-chat">
            <i class="fas fa-robot"></i>
            <div class="ai-content">
                <b>Analis AI Mama Gio:</b>
                <span id="aiMsg">Sedang menganalisa data keuangan kamu...</span>
            </div>
        </div>
    </div>

<script>
    // GANTI LINK INI DENGAN LINK WEB APP KAMU SENDIRI
    const SCRIPT_URL = 'GANTI_PAKAI_LINK_WEB_APP_KAMU';

    let chartL, chartP;

    async function fetchData() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            updateDashboard(data);
        } catch (e) { console.log("Gagal ambil data"); }
    }

    function updateDashboard(data) {
        let tOmzet = 0, tBiaya = 0;
        data.forEach(d => {
            if(d.tipe === 'Masuk') tOmzet += d.harga;
            else tBiaya += d.harga;
        });

        document.getElementById('txtOmzet').innerText = "Rp " + tOmzet.toLocaleString();
        document.getElementById('txtBiaya').innerText = "Rp " + tBiaya.toLocaleString();
        const profit = tOmzet - tBiaya;
        document.getElementById('txtProfit').innerText = "Rp " + profit.toLocaleString();

        // AI Message
        const msg = document.getElementById('aiMsg');
        if (profit > 0) msg.innerText = "Bisnis sehat! Keuntungan kamu positif. Rekomendasi: Gunakan profit untuk promo di akhir pekan.";
        else msg.innerText = "Omzet belum menutupi biaya. Coba cek lagi harga jual atau kurangi belanja yang tidak mendesak.";

        renderCharts(data, tOmzet, tBiaya);
    }

    function renderCharts(data, omzet, biaya) {
        const ctxL = document.getElementById('lineChart').getContext('2d');
        const ctxP = document.getElementById('pieChart').getContext('2d');
        
        if(chartL) chartL.destroy();
        if(chartP) chartP.destroy();

        chartL = new Chart(ctxL, {
            type: 'line',
            data: {
                labels: ['Sen','Sel','Rab','Kam','Jum','Sab','Min'],
                datasets: [{ label: 'Omzet', data: [120, 190, 150, 250, 200, 320, 450], borderColor: '#1abc9c', tension: 0.3 }]
            }
        });

        chartP = new Chart(ctxP, {
            type: 'doughnut',
            data: {
                labels: ['Omzet', 'Biaya'],
                datasets: [{ data: [omzet || 1, biaya || 1], backgroundColor: ['#3498db', '#e74c3c'] }]
            }
        });
    }

    async function simpanBelanja() {
        const n = document.getElementById('nama').value;
        const h = document.getElementById('harga').value;
        if(!n || !h) return alert("Isi dulu Bos!");
        
        const btn = document.getElementById('btnSimpan');
        btn.innerText = "WAIT..."; btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ nama: n, harga: parseInt(h), tipe: 'Keluar' })
            });
            alert("Berhasil disimpan!");
            location.reload();
        } catch (e) { alert("Gagal!"); }
    }

    fetchData();
</script>
</body>
</html>
